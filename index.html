<style>

/* RESET */

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* VARIABLES */

:root {

  --gold: #F5C842;
  --gold-dim: #c9a22e;
  --gold-glow: rgba(245,200,66,0.35);
  --gold-subtle: rgba(245,200,66,0.08);

  --border: rgba(255,255,255,0.07);

  --text: #f0f0f8;
  --muted: rgba(240,240,248,0.45);

  --r: 12px;
  --r-lg: 20px;
}

/* BODY */

html {
  scroll-behavior: smooth;
}

body {

  font-family: 'DM Sans', sans-serif;

  background: var(--bg);

  color: var(--text);

  min-height: 100vh;

  overflow-x: hidden;

  -webkit-font-smoothing: antialiased;
}

/* REMOVE ALL EXTERNAL CSS */
/* NO main.css */
/* EVERYTHING INLINE */

/* BACKGROUND */

.bg-ambient {

  position: fixed;
  inset: 0;

  z-index: 0;

  pointer-events: none;
}

.orb {

  position: absolute;

  border-radius: 50%;

  filter: blur(90px);

  opacity: 0.18;
}

.orb-1 {

  width: 600px;
  height: 600px;

  background: #F5C842;

  top: -200px;
  left: 50%;

  transform: translateX(-50%);
}

.orb-2 {

  width: 400px;
  height: 400px;

  background: #ff8c42;

  bottom: -100px;
  right: -100px;

  opacity: 0.10;
}

/* GRID */

.bg-grid {

  position: fixed;

  inset: 0;

  z-index: 0;

  pointer-events: none;

  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);

  background-size: 60px 60px;
}

/* HEADER */

header {

  position: fixed;

  top: 0;
  left: 0;
  right: 0;

  z-index: 100;

  display: flex;

  align-items: center;
  justify-content: space-between;

  padding: 18px 32px;

  background: rgba(8,8,16,0.7);

  backdrop-filter: blur(20px);

  border-bottom: 1px solid var(--border);
}

.logo {

  font-family: 'Syne', sans-serif;

  font-size: 22px;

.nav-cta {

  font-size: 13px;

  font-weight: 600;

  color: var(--bg);

  padding: 10px 22px;

}

/* MAIN */

main {

  position: relative;

  z-index: 10;

  min-height: 100vh;

  display: flex;

  align-items: center;
  justify-content: center;

  padding: 120px 24px 80px;
}

.hero {

  max-width: 760px;

  width: 100%;

  text-align: center;
}

/* BADGE */

.invite-badge {

  display: inline-flex;

  align-items: center;

  gap: 8px;

  background: var(--gold-subtle);

  border: 1px solid var(--border-gold);

  border-radius: 50px;

  padding: 7px 18px;

  color: var(--gold);

  margin-bottom: 32px;

  font-size: 12px;

  text-transform: uppercase;
}

.invite-dot {

  width: 6px;
  height: 6px;

  background: var(--gold);

  border-radius: 50%;
}

/* HEADINGS */

h1 {

  line-height: 1.05;

  letter-spacing: -2px;

}

.headline-plain {

}

.headline-gold {

}

/* SUBTITLE */

  color: var(--muted);

  line-height: 1.7;

  font-size: 17px;
}

.code-card {

  display: inline-flex;

  align-items: center;

  gap: 12px;

  background: var(--bg3);

  border: 1px solid var(--border-gold);

  border-radius: var(--r);

  padding: 16px 26px;

}

.code-label {

  gap: 12px;

  font-size: 13px;

  color: var(--muted);

  margin-bottom: 60px;

  font-family: 'Syne', sans-serif;

  font-size: 24px;
